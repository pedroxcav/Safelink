vservices:

  postgresql:
    image: postgres:16
    container_name: safelink-database
    restart: always
    environment:
      POSTGRES_DB: safelink
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  safelink:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: safelink-api
    depends_on:
      - postgresql
    restart: always
    environment:
      DATABASE_URL: jdbc:postgresql://postgresql:5432/safelink
      DATABASE_USERNAME: admin
      DATABASE_PASSWORD: admin
      PRIVATE_KEY: 
      PUBLIC_KEY: 
    ports:
      - "8080:8080"

volumes:
  postgres_data: